<ion-content [fullscreen]="true">
  <div class="ax-screen ax-auth">
    <div class="ax-auth-card ax-glass ax-fade-in">
      <div class="ax-auth-brand">
        <img class="ax-logo" src="assets/ax-ui/logo.png" alt="ArenaX logo" />
        <h1>Create Arena<span>X</span></h1>
        <p>Join the elite esports challenge network.</p>
      </div>

      <div class="ax-grid">
        <input class="ax-input" type="text" placeholder="Username" [(ngModel)]="username" />
        <input class="ax-input" type="email" placeholder="Email" [(ngModel)]="email" />
        <div class="ax-input-wrap">
          <input
            class="ax-input"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Password"
            [(ngModel)]="password"
          />
          <button class="ax-toggle-btn" type="button" (click)="showPassword = !showPassword">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
        <div class="ax-input-wrap">
          <input
            class="ax-input"
            [type]="showConfirmPassword ? 'text' : 'password'"
            placeholder="Confirm Password"
            [(ngModel)]="confirmPassword"
          />
          <button class="ax-toggle-btn" type="button" (click)="showConfirmPassword = !showConfirmPassword">
            {{ showConfirmPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
        <button class="ax-btn ax-btn-primary" (click)="submit()">Register</button>
        <p class="ax-error" *ngIf="error">{{ error }}</p>
      </div>

      <div class="ax-auth-links">
        <span>Already have an account? <a routerLink="/auth/login">Login</a></span>
      </div>
    </div>
  </div>
</ion-content>
