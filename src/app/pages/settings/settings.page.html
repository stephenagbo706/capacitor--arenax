<ion-content [fullscreen]="true">
  <div class="ax-screen ax-fade-in">
    <header>
      <h2>Settings</h2>
      <p class="ax-muted">Secure your ArenaX account.</p>
    </header>

    <div class="ax-grid">
      <a class="ax-card ax-row" routerLink="/profile/edit">
        <strong>Edit Profile</strong>
        <i class="fa-solid fa-chevron-right"></i>
      </a>
      <a class="ax-card ax-row" routerLink="/auth/forgot">
        <strong>Change Password</strong>
        <i class="fa-solid fa-chevron-right"></i>
      </a>
      <button class="ax-card ax-row two-factor-card" type="button" (click)="manageTwoFactor()">
        <div>
          <strong>Two-Factor Authentication</strong>
          <p class="ax-muted">Add an extra security layer</p>
          <small class="ax-badge">{{ twoFactorEnabled ? 'Enabled' : 'Disabled' }}</small>
        </div>
        <i class="fa-solid fa-shield-halved"></i>
      </button>
      <button class="ax-card ax-row danger" type="button" (click)="confirmDeleteAccount()">
        <div>
          <strong>Delete Account</strong>
          <p class="ax-muted">Permanently remove your data</p>
        </div>
        <i class="fa-solid fa-trash"></i>
      </button>
      <button class="ax-btn" (click)="logout()">Logout</button>
    </div>
  </div>
</ion-content>
